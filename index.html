<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GL Tailandês · Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15120E;
    --surface:#1E1A14;
    --surface-2:#241F18;
    --text:#F4F0E8;
    --muted:#A99E8B;
    --faint:#6E6656;
    --amber:#E8A33D;
    --amber-dim:#8A6B2E;
    --line:#2C271F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;background:var(--bg)}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.45;
    margin:0;
    -webkit-font-smoothing:antialiased;
  }
  .page{
    background:var(--bg);
    min-height:100vh;
    max-width:660px;margin:0 auto;
    padding:28px 18px calc(52px + env(safe-area-inset-bottom));
  }

  /* Header */
  .eyebrow{
    font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
    color:var(--amber);margin-bottom:10px;
  }
  h1{
    font-weight:700;font-size:30px;line-height:1.08;letter-spacing:-.01em;margin-bottom:6px;
  }
  h1 .k{color:var(--amber)}
  .sub{color:var(--muted);font-size:13.5px;font-weight:400;max-width:44ch}

  /* Progress */
  .progress-wrap{margin:22px 0 30px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .progress-count{font-size:13px;font-weight:500;color:var(--muted)}
  .progress-count b{color:var(--text);font-weight:600}
  .progress-pct{font-size:12px;font-weight:600;color:var(--amber);font-variant-numeric:tabular-nums}
  .track{height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar{height:100%;width:0;background:var(--amber);border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}

  /* Abas de ano (fixas no topo, roláveis) */
  .tabs{
    position:sticky;top:0;z-index:5;
    display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    background:var(--bg);padding:12px 0 14px;margin:0 0 6px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:none;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:7px;white-space:nowrap;
    font-size:13.5px;font-weight:600;color:var(--muted);
    background:var(--surface);border:1px solid var(--line);
    border-radius:99px;padding:8px 13px;
    font-variant-numeric:tabular-nums;
    transition:background .18s,color .18s,border-color .18s;
  }
  .tab.soon{text-transform:uppercase;letter-spacing:.06em;font-size:11.5px}
  .tab .tab-n{
    font-size:11px;font-weight:600;color:var(--faint);
    background:var(--bg);border-radius:99px;padding:1px 7px;min-width:20px;text-align:center;
  }
  .tab.active{background:var(--amber);color:var(--bg);border-color:var(--amber)}
  .tab.active .tab-n{color:var(--amber);background:var(--bg)}
  .panel{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* Ship block */
  .ship{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 16px 8px;
    margin-bottom:14px;
  }
  .ship-name{font-weight:700;font-size:17px;color:var(--amber);letter-spacing:-.01em}
  .pair{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    color:var(--muted);font-size:12.5px;font-weight:400;margin-top:3px;
  }
  .pair .link{color:var(--amber-dim);font-weight:600}

  /* Series row (the checkable unit) */
  .series{
    display:flex;align-items:flex-start;gap:12px;
    padding:12px 4px;border-top:1px solid var(--line);margin-top:12px;
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  }
  .series:first-of-type{margin-top:14px}
  .box{
    flex:none;width:22px;height:22px;margin-top:1px;border-radius:7px;
    border:1.5px solid var(--amber-dim);background:transparent;
    display:grid;place-items:center;transition:background .18s,border-color .18s;
  }
  .box svg{width:13px;height:13px;stroke:var(--bg);stroke-width:3.2;fill:none;
    stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.5);
    transition:opacity .18s,transform .2s cubic-bezier(.34,1.56,.64,1)}
  .series-body{flex:1;min-width:0}
  .series-title{font-size:14.5px;font-weight:500;letter-spacing:-.005em}
  .series-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:3px}
  .year{font-size:11.5px;color:var(--faint);font-weight:500;font-variant-numeric:tabular-nums}
  .tag{
    font-size:10.5px;font-weight:600;letter-spacing:.02em;
    padding:2px 7px;border-radius:99px;border:1px solid var(--line);color:var(--muted);
  }
  .tag.rating{color:var(--amber);border-color:var(--amber-dim)}
  .tag.pioneer{color:var(--muted)}
  .tag.soon{color:var(--amber);border-color:var(--amber-dim);border-style:dashed}
  .tag.airing{color:var(--amber);border-color:var(--amber)}

  /* Checked state */
  .series.done .box{background:var(--amber);border-color:var(--amber)}
  .series.done .box svg{opacity:1;transform:scale(1)}
  .series.done .series-title{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--amber-dim)}

  footer{margin-top:34px;color:var(--faint);font-size:11.5px;line-height:1.6;text-align:center}
  footer .dot{color:var(--amber-dim)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const KEY = "gl_watchlist_v1";
let state = {};

const CHECK = '<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>';

function seriesRowHTML(se){
  const done = !!state[se.id];
  let tags = '';
  if(se.rating) tags += `<span class="tag rating">&#9733; ${se.rating}</span>`;
  if(se.pioneer) tags += `<span class="tag pioneer">${se.pioneer}</span>`;
  if(se.tag){
    let cls = '';
    if(se.tag==='em breve') cls=' soon';
    else if(se.tag==='no ar') cls=' airing';
    tags += `<span class="tag${cls}">${se.tag}</span>`;
  }
  return `<div class="series${done?' done':''}" data-id="${se.id}" role="button" tabindex="0" aria-pressed="${done}">
      <div class="box">${CHECK}</div>
      <div class="series-body">
        <div class="series-title">${se.t}</div>
        <div class="series-meta">${tags}</div>
      </div>
    </div>`;
}

function shipBlock(s, series){
  const block = document.createElement('div');
  block.className = 'ship';
  const pairInner = s.b ? `${s.a} <span class="link">&#8760;</span> ${s.b}` : s.a;
  let html = `<div class="ship-name">${s.ship}</div>
    <div class="pair">${pairInner}</div>`;
  series.forEach(se => { html += seriesRowHTML(se); });
  block.innerHTML = html;
  return block;
}

let activeTab = null;

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  let total = 0;

  // Agrupa por ano: ano -> [{ship, series[]}]. Séries sem ano vão pra "Em breve".
  const byYear = {};
  const soon = [];
  DATA.forEach(s => {
    const perYear = {};
    const noYear = [];
    s.series.forEach(se => {
      total++;
      if(se.y){ (perYear[se.y] = perYear[se.y] || []).push(se); }
      else { noYear.push(se); }
    });
    Object.keys(perYear).forEach(y => {
      (byYear[y] = byYear[y] || []).push({ ship:s, series:perYear[y] });
    });
    if(noYear.length) soon.push({ ship:s, series:noYear });
  });

  const years = Object.keys(byYear).sort((a,b) => b - a);
  const tabKeys = years.concat(soon.length ? ['Em breve'] : []);
  if(!activeTab || tabKeys.indexOf(activeTab) === -1){
    activeTab = tabKeys.indexOf('2026') !== -1 ? '2026' : tabKeys[0];
  }

  const countFor = key => key === 'Em breve'
    ? soon.reduce((n,e)=>n+e.series.length,0)
    : byYear[key].reduce((n,e)=>n+e.series.length,0);

  // Barra de abas (fixa no topo, rolável na horizontal)
  const tabBar = document.createElement('div');
  tabBar.className = 'tabs';
  const panels = document.createElement('div');

  tabKeys.forEach(key => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (key === 'Em breve' ? ' soon' : '');
    tab.dataset.key = key;
    tab.innerHTML = `${key}<span class="tab-n">${countFor(key)}</span>`;
    tab.addEventListener('click', () => { activeTab = key; showActive(); });
    tabBar.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.dataset.key = key;
    const entries = key === 'Em breve' ? soon : byYear[key];
    entries.forEach(e => panel.appendChild(shipBlock(e.ship, e.series)));
    panels.appendChild(panel);
  });

  list.appendChild(tabBar);
  list.appendChild(panels);

  function showActive(){
    tabBar.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.key === activeTab));
    panels.querySelectorAll('.panel').forEach(p =>
      p.style.display = p.dataset.key === activeTab ? '' : 'none');
    const at = tabBar.querySelector('.tab.active');
    if(at) at.scrollIntoView({inline:'center', block:'nearest'});
  }
  showActive();

  document.getElementById('total').textContent = total;
  updateProgress(total);

  document.querySelectorAll('.series').forEach(el=>{
    el.addEventListener('click', ()=>toggle(el));
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle(el);}
    });
  });
}

function toggle(el){
  const id = el.dataset.id;
  state[id] = !state[id];
  el.classList.toggle('done', state[id]);
  el.setAttribute('aria-pressed', state[id]);
  const total = document.querySelectorAll('.series').length;
  updateProgress(total);
  save();
}

function updateProgress(total){
  const done = Object.values(state).filter(Boolean).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('done').textContent = done;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
}

// Detecta o melhor jeito de salvar: localStorage (quando hospedado/aberto no
// navegador) ou window.storage (dentro do preview do Claude).
let backend = 'local';
try { localStorage.setItem('_glt','1'); localStorage.removeItem('_glt'); }
catch(e){ backend = 'cloud'; }

async function save(){
  const val = JSON.stringify(state);
  if(backend === 'local'){
    try { localStorage.setItem(KEY, val); } catch(e){}
  } else {
    try { await window.storage.set(KEY, val); } catch(e){}
  }
}
async function load(){
  if(backend === 'local'){
    try { const v = localStorage.getItem(KEY); if(v) state = JSON.parse(v); } catch(e){}
  } else {
    try { const r = await window.storage.get(KEY); if(r && r.value) state = JSON.parse(r.value); }
    catch(e){}
  }
  render();
}

load();
